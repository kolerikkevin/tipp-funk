name: Tägliches Tipp-Funk Update

on:
  schedule:
    # 06:30 UTC = 08:30 Sommerzeit (CEST). Im Winter (CET) läuft es 07:30 Ortszeit – bei Bedarf anpassen.
    - cron: "30 6 * * *"
  workflow_dispatch: {}   # erlaubt manuelles Auslösen per Knopf

permissions:
  contents: write   # damit der aktualisierte Stand zurück committet werden kann
  pages: write
  id-token: write

concurrency:
  group: tipp-funk
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Daten ziehen + Schlagzeilen texten
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update.py
      - name: Aktualisierten Stand committen
        run: |
          git config user.name "tipp-funk-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/parsed data/history data/headline_cache.json site/data
          git commit -m "Update $(date -u +%F)" || echo "nichts Neues"
          git push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
