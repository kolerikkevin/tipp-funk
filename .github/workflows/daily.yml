name: Tägliches Tipp-Funk Update

on:
  schedule:
    # GitHub-Cron ist "best effort": Läufe zur vollen/halben Stunde werden unter Last
    # verzögert ODER ganz verworfen. Deshalb KRUMME Minuten + MEHRFACH gestaffelt:
    # feuert GitHub einen Slot nicht, fängt der nächste die Morgen-Ausgabe.
    # Dank Headline-Cache + "nichts Neues"-Commit sind Zusatzläufe billige No-Ops,
    # die concurrency-Gruppe serialisiert sie. Zeiten in UTC (Sommer = +2 = CEST):
    - cron: "23 6 * * *"   # ~08:23 CEST  (primär, knapp vor 8:30)
    - cron: "47 6 * * *"   # ~08:47 CEST  (Backup, falls primärer Slot verworfen)
    - cron: "19 7 * * *"   # ~09:19 CEST  (letztes Sicherheitsnetz)
    # Im Winter (CET = +1) liegt alles eine Stunde früher (07:23/07:47/08:19 Ortszeit).
  workflow_dispatch: {}   # erlaubt manuelles Auslösen per Knopf

permissions:
  contents: write   # damit der aktualisierte Stand zurück committet werden kann
  pages: write
  id-token: write

concurrency:
  group: tipp-funk
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Daten ziehen + Schlagzeilen texten
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update.py
      - name: Aktualisierten Stand committen
        run: |
          git config user.name "tipp-funk-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/parsed data/history data/headline_cache.json site/data
          git commit -m "Update $(date -u +%F)" || echo "nichts Neues"
          git push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
